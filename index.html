<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: transparent;
  font-family: "Times New Roman", serif;
  color: black;
}

/* WIDGET ONLY */
#eneremit-activity-widget {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  font-size: 14px;
  line-height: 1.6;
}

/* rows */
.eneremit-row {
  display: grid;
  grid-template-columns: max-content 1fr;
  margin-top: 6px;
  text-decoration: none;
  color: black;
}

.eneremit-row:first-child {
  margin-top: 0;
}

/* label */
.eneremit-label::after {
  content: " ";
}

/* value */
.eneremit-value {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* hover */
.eneremit-row:hover .eneremit-value {
  text-decoration: underline;
}

/* mobile wrapping */
@media (max-width: 500px) {
  .eneremit-value {
    white-space: normal;
  }
}
</style>
</head>

<body>

<div id="eneremit-activity-widget">

  <a class="eneremit-row" id="gr-link" target="_blank">
    <span class="eneremit-label" id="gr-label">Last Read:</span>
    <span class="eneremit-value" id="gr-text">-</span>
  </a>

  <a class="eneremit-row" id="lb-link" target="_blank">
    <span class="eneremit-label" id="lb-label">Last Watched:</span>
    <span class="eneremit-value" id="lb-text">-</span>
  </a>

  <a class="eneremit-row" id="lfm-link" target="_blank">
    <span class="eneremit-label" id="lfm-label">Last Listened To:</span>
    <span class="eneremit-value" id="lfm-text">-</span>
  </a>

</div>

<script>
const API = "https://eneremit-widget.eneremit.workers.dev/json";

async function loadWidget() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    document.getElementById("gr-text").textContent = data.goodreads.text;
    document.getElementById("gr-label").textContent = data.goodreads.label;
    document.getElementById("gr-link").href = data.goodreads.url;

    document.getElementById("lb-text").textContent = data.letterboxd.text;
    document.getElementById("lb-label").textContent = data.letterboxd.label;
    document.getElementById("lb-link").href = data.letterboxd.url;

    document.getElementById("lfm-text").textContent = data.lastfm.text;
    document.getElementById("lfm-label").textContent = data.lastfm.label;
    document.getElementById("lfm-link").href = data.lastfm.url;

  } catch (e) {
    console.log(e);
  }
}

/* load once */
loadWidget();

/* refresh every 2.5 minutes */
setInterval(loadWidget, 150000);
</script>

</body>
</html>
